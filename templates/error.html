<!DOCTYPE html>
<html>
<head>
    <title>Error · MediCare</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .card {
            background: rgba(30, 41, 59, 0.9);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid #38bdf8;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5);
        }
        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #e2e8f0;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .btn {
            background: #38bdf8;
            color: white;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px -4px #38bdf8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚠️ Error</h1>
        <p>{{ mensaje }}</p>
        <a href="/" class="btn">Volver al inicio</a>
    </div>
</body>
</html>
